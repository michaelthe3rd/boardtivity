<svg width="1500" height="500" viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1500" height="500" fill="#0d0f12"/>

  <!-- Subtle grid lines for texture -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1500" height="500" fill="url(#grid)"/>

  <!-- Subtle glow blob -->
  <ellipse cx="750" cy="250" rx="400" ry="220" fill="rgba(90,141,245,0.06)"/>

  <!-- Logo icon -->
  <rect x="480" y="140" width="220" height="220" rx="40" ry="40" fill="none" stroke="white" stroke-width="11"/>
  <!-- Top-left bracket -->
  <path d="M504 164 H528 M504 164 V188" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- Top-right bracket -->
  <path d="M676 164 H652 M676 164 V188" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- Bottom-left bracket -->
  <path d="M504 336 H528 M504 336 V312" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- Bottom-right bracket -->
  <path d="M676 336 H652 M676 336 V312" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- B -->
  <text x="590" y="302" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="120" text-anchor="middle" fill="white">B</text>

  <!-- Wordmark -->
  <text x="720" y="272" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="86" text-anchor="start" fill="white" letter-spacing="-3">Boardtivity</text>

  <!-- Tagline -->
  <text x="722" y="316" font-family="Arial, sans-serif" font-weight="400" font-size="26" text-anchor="start" fill="rgba(255,255,255,0.42)" letter-spacing="0.5">Tasks · Ideas · Focus</text>
</svg>
